# Bumps version and may tag with semantic-release, then (when the version
# actually changes) builds and uploads to PyPI in the same run. Pushes with
# GITHUB_TOKEN do not start other workflows, so we cannot use a tag-triggered
# publish workflow; publishing must run here.
#
# On https://pypi.org, configure a Trusted Publisher for *this* workflow
# (release.yaml), not a separate "publish" workflow.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          version: "0.11.7"

      - name: Sync dev dependencies
        run: |
          uv sync --frozen --group dev

      - name: Set deterministic release environment
        shell: bash
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          echo "TZ=UTC" >> "$GITHUB_ENV"
          echo "LC_ALL=C.UTF-8" >> "$GITHUB_ENV"
          echo "LANG=C.UTF-8" >> "$GITHUB_ENV"

      - name: Record version before release
        id: vbefore
        run: |
          echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release version

      - name: Record version after release
        id: vafter
        run: |
          echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Clean and build
        if: steps.vbefore.outputs.version != steps.vafter.outputs.version
        run: |
          rm -rf dist build *.egg-info
          uv build

      - name: Check distributions
        if: steps.vbefore.outputs.version != steps.vafter.outputs.version
        run: |
          uv run --with twine==6.1.0 twine check --strict dist/*

      - name: Publish to PyPI
        if: steps.vbefore.outputs.version != steps.vafter.outputs.version
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0